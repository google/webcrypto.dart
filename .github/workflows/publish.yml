name: Publish to pub.dev

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    environment: pub.dev
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - name: Validate Native Assets package contents
        shell: bash
        run: |
          set -o pipefail
          flutter pub publish --dry-run 2>&1 | tee /tmp/publish-dry-run.log
          grep -q 'hook/build.dart' /tmp/publish-dry-run.log
          grep -q 'src/CMakeLists.txt' /tmp/publish-dry-run.log
          grep -q 'third_party/boringssl/sources.cmake' /tmp/publish-dry-run.log
      - name: Publish
        run: flutter pub publish --force
