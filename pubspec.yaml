name: webcrypto
version: 0.7.0
description: Cross-platform implementation of Web Cryptography APIs for Flutter.
repository: https://github.com/google/webcrypto.dart

environment:
  sdk: ^3.10.0
  flutter: '>=3.38.0'

dependencies:
  code_assets: ^1.0.0
  crypto: ^3.0.7
  ffi: ^2.0.0
  hooks: ^1.0.0
  logging: ^1.3.0
  meta: ^1.3.0
  native_toolchain_cmake: ^0.2.5
  path: ^1.9.0
  # Needed for `lib/src/flutter/webcrypto_plugin.dart` which allows boiler-plate
  # in `flutter.plugin.platforms.web` added below.
  flutter_web_plugins:
    sdk: flutter
  flutter:
    sdk: flutter

dev_dependencies:
  ffigen: ^11.0.0
  test: ^1.16.0
  yaml: ^3.0.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  coverage: any # we only need format_coverage, don't care what version

flutter:
  plugin:
    platforms:
      # Native platforms are built and bundled by hook/build.dart. The web
      # implementation delegates to the browser's Web Crypto API.
      web:
        pluginClass: WebcryptoPlugin
        fileName: src/flutter/webcrypto_plugin.dart
topics:
 - crypto
