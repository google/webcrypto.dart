preamble: |
  // Re-run `tool/update-jca-bindings.sh` to regenerate.
output:
  dart:
    path: generated_bindings.dart
    structure: single_file
summarizer:
  backend: asm
android_sdk_config:
  # Keep this API level pinned so generated bindings do not depend on whichever
  # Android SDK platform happens to be the local default.
  versions:
    - '36'
classes:
  - java.security.MessageDigest
  - java.security.SecureRandom
  - javax.crypto.Cipher
  - javax.crypto.KeyGenerator
  - javax.crypto.Mac
  - javax.crypto.spec.GCMParameterSpec
  - javax.crypto.spec.IvParameterSpec
  - javax.crypto.spec.SecretKeySpec
